<body>
    <div class="bg-animation"></div>

    <div class="container">
        <div class="auth-card">

            <div class="error-message" id="errorMessage"></div>
            <div class="success-message" id="successMessage"></div>

            <form id="signupForm">
                <div class="form-group">
                    <label for="fullname">Full Name</label>
                    <div class="input-wrapper">
                        <span class="input-icon">👤</span>
                        <input type="text" id="fullname" name="fullname" placeholder="Enter your full name" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="input-wrapper">
                        <span class="input-icon">📧</span>
                        <input type="email" id="email" name="email" placeholder="Enter your email" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="password" name="password" placeholder="Create a strong password"
                            required>
                    </div>
                    <div class="password-strength">
                        <span id="strengthText">Password strength</span>
                        <div class="strength-bar">
                            <div class="strength-fill" id="strengthFill"></div>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="confirmPassword" name="confirmPassword"
                            placeholder="Re-enter your password" required>
                    </div>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="terms" name="terms" required>
                    <label for="terms">
                        I agree to the <a href="#" onclick="alert('Terms of Service'); return false;">Terms of
                            Service</a> and <a href="#" onclick="alert('Privacy Policy'); return false;">Privacy
                            Policy</a>
                    </label>
                </div>

                <button type="submit" class="btn-submit" id="submitBtn">Create Account</button>
            </form>

            <div class="divider">
                <span>OR</span>
            </div>

            <div class="signin-link">
                Already have an account? <a href="signin.html">Sign In</a>
            </div>

            <div class="back-home">
                <a href="index.html">← Back to Home</a>
            </div>
        </div>

    <script>
        const passwordInput = document.getElementById('password');
        const strengthFill = document.getElementById('strengthFill');
        const strengthText = document.getElementById('strengthText');

        // Password strength checker
        passwordInput.addEventListener('input', function () {
            const password = this.value;
            let strength = 0;

            if (password.length >= 8) strength++;
            if (password.match(/[a-z]/) && password.match(/[A-Z]/)) strength++;
            if (password.match(/[0-9]/)) strength++;
            if (password.match(/[^a-zA-Z0-9]/)) strength++;

            strengthFill.className = 'strength-fill';

            if (strength === 0) {
                strengthText.textContent = 'Password strength';
                strengthFill.style.width = '0%';
            } else if (strength <= 2) {
                strengthText.textContent = 'Weak password';
                strengthFill.classList.add('strength-weak');
            } else if (strength === 3) {
                strengthText.textContent = 'Medium password';
                strengthFill.classList.add('strength-medium');
            } else {
                strengthText.textContent = 'Strong password';
                strengthFill.classList.add('strength-strong');
            }
        });

        // Form submission
        document.getElementById('signupForm').addEventListener('submit', function (e) {
            e.preventDefault();

            const fullname = document.getElementById('fullname').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const terms = document.getElementById('terms').checked;
            const errorMessage = document.getElementById('errorMessage');
            const successMessage = document.getElementById('successMessage');

            // Hide previous messages
            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';

            // Validation
            if (!terms) {
                errorMessage.textContent = '✗ Please accept the Terms of Service and Privacy Policy.';
                errorMessage.style.display = 'block';
                return;
            }

            if (password !== confirmPassword) {
                errorMessage.textContent = '✗ Passwords do not match. Please try again.';
                errorMessage.style.display = 'block';
                return;
            }

            if (password.length < 8) {
                errorMessage.textContent = '✗ Password must be at least 8 characters long.';
                errorMessage.style.display = 'block';
                return;
            }

            // Store user data (in a real app, this would be sent to a server)
            const userData = {
                fullname: fullname,
                email: email,
                password: password,
                createdAt: new Date().toISOString()
            };

            // Save to localStorage (for demo purposes)
            localStorage.setItem('userData', JSON.stringify(userData));

            successMessage.textContent = '✓ Account created successfully! Redirecting to sign in...';
            successMessage.style.display = 'block';

            // Redirect to sign in page after 2 seconds
            setTimeout(() => {
                window.location.href = 'signin.html';
            }, 2000);
        });
    </script>
